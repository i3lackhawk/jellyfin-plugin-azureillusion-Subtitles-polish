name: Deploy Jellyfin Plugin Repo

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Plugin
        run: |
          mkdir -p build
          zip -j build/Jellyfin.Plugin.AzureIllusion.zip Jellyfin.Plugin.AzureIllusion.dll

      - name: Jellyfin Repo Manifest Manager
        uses: LizardByte/jellyfin-plugin-repo@v2026.602.212143
        with:
          input_file: build/Jellyfin.Plugin.AzureIllusion.zip
          output_dir: repo-dist
          token: ${{ secrets.GITHUB_TOKEN }}
